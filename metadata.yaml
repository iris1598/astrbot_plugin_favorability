name: astrbot_plugin_favorability
desc: 好感度系统——AI根据对话内容自主更新用户好感度与评价，支持表情包回应、禁言处罚、PIL图片渲染查询与排行。
help: |
  用户指令：
    /查询好感度 [@用户]      — 查询好感度（查自己或@他人，PIL图片渲染）
    /好感度排行             — 正序排行榜（高分在前，PIL图片渲染）
    /好感度倒序             — 倒序排行榜（低分在前，PIL图片渲染）
    /重置好感度             — 重置自己的好感度

  管理员指令：
    /设置好感度 <@用户> <分数>    — 强制设定指定用户好感度
    /重置指定好感度 <@用户>       — 重置指定用户好感度
    /禁言 <@用户> <秒数>          — 禁言指定用户（最大300秒）
    /解除禁言 <@用户>             — 解除指定用户禁言

  禁言机制（v2.1.0+）：
    - LLM 可在用户持续恶劣行为（辱骂、骚扰等）且好感度≤-20时输出 [MUTE:N] 标签触发禁言
    - 禁言最长 5 分钟（300秒），期间该用户的消息将不会触发 LLM 回复
    - 禁言期间，Bot 将发送"不理你了"、"假装听不见"等趣味回复
    - 管理员可通过 /禁言 和 /解除禁言 手动控制

  表情包：在 data/plugin_data/astrbot_plugin_favorability/stickers/<分类名>/ 下放置图片即可启用 [STK:分类名] 表情包功能。

  设置项（WebUI）：
    - 好感度系统开关：启用/禁用好感度功能
    - 表情包系统开关：启用/禁用表情包功能
    - 禁言系统开关：启用/禁用禁言功能
    - 系统时间注入开关：启用后每次请求注入当前时间（通过 extra_user_content_parts）
    - 用户信息注入开关：启用后每次请求注入用户名和ID（通过 extra_user_content_parts）
version: v2.1.0
author: Iris1598
repo: "https://github.com/iris1598/astrbot_plugin_favorability"
